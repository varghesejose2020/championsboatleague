<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official schedule and points table for the Champions Boat League 2025.">
    <title>Champions Boat League 2025 | Official Site</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Animated Ocean Wave Background (CSS Only) for depth -->
    <div class="background-overlay"></div>

    <header class="hero-section">
        <div class="logo-container">
            <img src="https://www.keralatourism.org/assets/img/cbl/icons/icon-cbl.svg" alt="CBL Icon" class="cbl-logo">
            <div class="glow-effect"></div>
        </div>
        <h1 class="hero-title">Champions Boat League 2025</h1>
        <p class="hero-subtitle">The Thrill of the Backwaters</p>
    </header>

    <main class="main-content">
        <!-- Schedule Table -->
        <section class="table-section fade-in-section">
            <div class="glass-panel">
                <div class="panel-header">
                    <h2>Match Schedule</h2>
                    <div class="ornament-line"></div>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Venue</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Winner (1st, 2nd, 3rd)</th>
                            </tr>
                        </thead>
                        <tbody id="schedule-body">
                            <!-- Schedule data inserted by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Points Table -->
        <section class="table-section fade-in-section delay-1">
            <div class="glass-panel">
                <div class="panel-header">
                    <h2>Points Table</h2>
                    <div class="ornament-line"></div>
                </div>
                <div class="table-responsive">
                    <table class="data-table points-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Boat Club</th>
                                <th>Team Name</th>
                                <th>Boat Name</th>
                                <th>Points</th>
                            </tr>
                        </thead>
                        <tbody id="points-table-body">
                            <!-- Points data inserted by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2025 Champions Boat League. All rights reserved.</p>
    </footer>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
